# CareerMatrix Spring Boot — environment-driven configuration for local and hosted deployments
spring.application.name=careermatrix-api

# PostgreSQL (recommended for deployment). Override these with host environment variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartcareer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12222069}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Gemini AI (recommended). Leave empty if you do not want AI features.
app.gemini.api-key=${APP_GEMINI_API_KEY:AIzaSyAeWXptLvE5auO0u94yz3_5xofcuku3ubA}
app.gemini.model=gemini-2.0-flash

# JWT secret — use a long random string in production (env var recommended)
app.jwt.secret=${APP_JWT_SECRET:CareerMatrixSecretKeyForJWTTokenGenerationMustBe256BitsLongPleaseChangeInProduction123456}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# CORS (Vite default port)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

server.port=${PORT:${SERVER_PORT:8080}}

# Optional OpenAI (Chat Completions). If empty, chat uses rule-based replies; roadmap uses JSON + generic fallback.
app.openai.api-key=${APP_OPENAI_API_KEY:}
app.openai.model=${APP_OPENAI_MODEL:gpt-4o-mini}
app.openai.base-url=${APP_OPENAI_BASE_URL:https://api.openai.com/v1}
