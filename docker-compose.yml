# Optional: run MySQL locally without installing the server
# Usage: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: careermatrix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: careermatrix
    ports:
      - "3306:3306"
    volumes:
      - careermatrix_mysql_data:/var/lib/mysql

volumes:
  careermatrix_mysql_data:
